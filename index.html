<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rod's Trail App</title>

<meta name="theme-color" content="#0d1a0f">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>

/* Your original CSS unchanged */

body{
background:#0d1a0f;
color:#d4ecd6;
font-family:'Rajdhani',sans-serif;
margin:0;
}

.app{
max-width:480px;
margin:auto;
padding-bottom:40px;
}

.header{
padding:20px;
border-bottom:1px solid #2d5c34;
}

.logo-text{
font-family:'Bebas Neue',sans-serif;
font-size:28px;
letter-spacing:2px;
color:#a8e063;
}

.coord-bar{
font-family:'Share Tech Mono',monospace;
font-size:11px;
margin-top:8px;
}

.section{
padding:16px;
}

button{
cursor:pointer;
}

.metric-card{
background:rgba(22,42,24,0.9);
padding:14px;
border-radius:10px;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="app">

<div class="header">

<div class="logo-text">Rod's Hiking App</div>

<div class="coord-bar">
<span id="latDisplay">LAT —</span>
<span id="lngDisplay">LNG —</span>
</div>

<div id="statusText">LOCATING</div>

</div>


<!-- LOCATION SECTION -->

<div class="section" id="locationSection" style="display:none">

<h3>Set Location</h3>

<button onclick="requestGPS()">📡 USE GPS</button>

<button onclick="toggleManual()">✏️ Enter Manually</button>

<div id="manualBlock" style="display:none;margin-top:10px;">

<input id="manualLat" placeholder="Latitude">
<input id="manualLng" placeholder="Longitude">

<button onclick="loadManual()">Load Weather</button>

</div>

</div>


<!-- WEATHER DASHBOARD -->

<div class="section">

<div class="metric-card">

<div id="tempVal">--°</div>

<div id="weatherDesc">Waiting for location...</div>

</div>

<div class="metric-card">
UV: <span id="uvVal">--</span>
</div>

<div class="metric-card">
Wind: <span id="windVal">--</span>
</div>

<div class="metric-card">
Humidity: <span id="humidVal">--</span>
</div>

</div>

</div>



<script>

/* ============================
GPS + LOCATION ENGINE
============================ */

let userLat = null
let userLng = null


function updateStatus(text){

const el=document.getElementById("statusText")
if(el) el.textContent=text

}


function setCoords(lat,lng){

userLat=lat
userLng=lng

const latEl=document.getElementById("latDisplay")
const lngEl=document.getElementById("lngDisplay")

if(latEl) latEl.textContent="LAT "+lat.toFixed(5)
if(lngEl) lngEl.textContent="LNG "+lng.toFixed(5)

updateStatus("GPS LOCK")

if(typeof loadWeather==="function"){
loadWeather(lat,lng)
}

}


function requestGPS(){

if(!navigator.geolocation){

updateStatus("GPS NOT SUPPORTED")
showManual()

return

}

updateStatus("LOCATING")

navigator.geolocation.getCurrentPosition(

function(position){

const lat=position.coords.latitude
const lng=position.coords.longitude

setCoords(lat,lng)

},

function(error){

console.log(error)

updateStatus("GPS BLOCKED")

showManual()

},

{
enableHighAccuracy:true,
timeout:12000,
maximumAge:60000
}

)

}


function loadManual(){

const lat=parseFloat(document.getElementById("manualLat").value)
const lng=parseFloat(document.getElementById("manualLng").value)

if(isNaN(lat)||isNaN(lng)){

alert("Enter valid coordinates")

return
}

setCoords(lat,lng)

}


function toggleManual(){

const block=document.getElementById("manualBlock")

if(!block) return

if(block.style.display==="none"){

block.style.display="block"

}else{

block.style.display="none"

}

}


function showManual(){

const loc=document.getElementById("locationSection")

if(loc) loc.style.display="block"

}



/* ============================
WEATHER LOADER (placeholder)
Replace with your existing API
============================ */

async function loadWeather(lat,lng){

try{

updateStatus("LOADING WEATHER")

const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`

const response=await fetch(url)

const data=await response.json()

const weather=data.current_weather

document.getElementById("tempVal").textContent=Math.round(weather.temperature)+"°"

document.getElementById("weatherDesc").textContent="Wind "+weather.windspeed+" km/h"

document.getElementById("windVal").textContent=weather.windspeed

updateStatus("READY")

}catch(e){

console.error(e)

updateStatus("WEATHER ERROR")

}

}



/* ============================
AUTO START GPS
============================ */

window.addEventListener("load",function(){

requestGPS()

})

</script>


</body>
</html>
