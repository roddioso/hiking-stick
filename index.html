<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Rod's Trail App</title>

<style>

body{
background:#0d1a0f;
color:#d4ecd6;
font-family:Arial,Helvetica,sans-serif;
margin:0;
}

.header{
padding:16px;
background:#162a18;
border-bottom:1px solid #2d5c34;
}

.logo{
font-size:22px;
font-weight:bold;
color:#a8e063;
}

.status{
font-size:12px;
margin-top:6px;
}

.section{
padding:18px;
}

.card{
background:#162a18;
border:1px solid #2d5c34;
padding:16px;
border-radius:10px;
margin-bottom:16px;
}

button{
background:#2d5c34;
border:none;
color:white;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
}

input{
padding:10px;
width:100%;
margin-bottom:10px;
border-radius:6px;
border:1px solid #2d5c34;
background:#0d1a0f;
color:white;
}

.metric{
font-size:28px;
color:#a8e063;
}

.coords{
font-family:monospace;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">🌲 Rod's Trail App</div>

<div class="status" id="statusText">
Locating GPS…
</div>

<div id="coordBar">
LAT — | LNG —
</div>

</div>


<div class="section">

<div class="card">

<h3>Location</h3>

<button onclick="requestGPS()">📡 Use GPS</button>

<br><br>

<input id="manualLat" placeholder="Latitude">

<input id="manualLng" placeholder="Longitude">

<button onclick="loadManual()">Load Coordinates</button>

</div>


<div class="card">

<h3>Coordinates</h3>

<div class="coords" id="coordDisplay">
Waiting for location…
</div>

<button onclick="copyCoords()">Copy Coordinates</button>

<br><br>

<a id="mapLink" target="_blank">Open in Google Maps</a>

</div>


<div class="card">

<h3>Weather</h3>

<div class="metric" id="tempVal">--°</div>

<div id="weatherDesc">Waiting for location</div>

</div>


</div>


<script>

let currentLat=null
let currentLng=null


function updateStatus(text){
document.getElementById("statusText").textContent=text
}


function updateCoords(lat,lng){

currentLat=lat
currentLng=lng

document.getElementById("coordBar").textContent=
"LAT "+lat.toFixed(5)+" | LNG "+lng.toFixed(5)

document.getElementById("coordDisplay").textContent=
lat.toFixed(6)+", "+lng.toFixed(6)

document.getElementById("mapLink").href=
"https://maps.google.com/?q="+lat+","+lng

updateStatus("GPS Locked")

loadWeather(lat,lng)

}


function requestGPS(){

if(!navigator.geolocation){

updateStatus("GPS not supported")

return

}

updateStatus("Locating GPS…")

navigator.geolocation.getCurrentPosition(

function(position){

let lat=position.coords.latitude
let lng=position.coords.longitude

updateCoords(lat,lng)

},

function(error){

console.log(error)

updateStatus("GPS blocked — enter coordinates")

},

{
enableHighAccuracy:true,
timeout:10000,
maximumAge:30000
}

)

}


function loadManual(){

let lat=parseFloat(document.getElementById("manualLat").value)
let lng=parseFloat(document.getElementById("manualLng").value)

if(isNaN(lat)||isNaN(lng)){
alert("Enter valid coordinates")
return
}

updateCoords(lat,lng)

}


function copyCoords(){

if(currentLat==null)return

let text=currentLat+","+currentLng

navigator.clipboard.writeText(text)

alert("Coordinates copied")

}


async function loadWeather(lat,lng){

try{

updateStatus("Loading weather…")

let url=
"https://api.open-meteo.com/v1/forecast?latitude="+lat+
"&longitude="+lng+
"&current_weather=true"

let res=await fetch(url)

let data=await res.json()

let temp=data.current_weather.temperature

document.getElementById("tempVal").textContent=temp+"°C"

document.getElementById("weatherDesc").textContent="Current temperature"

updateStatus("Trail Intel Ready")

}catch(e){

console.log(e)

updateStatus("Weather unavailable")

}

}


function updateClock(){

let now=new Date()

}


window.onload=function(){

requestGPS()

setInterval(updateClock,1000)

}

</script>


</body>

</html>
